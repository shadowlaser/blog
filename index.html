---
layout: default
title: blog list
---
<div id="home">
  <h1>Blog Posts</h1>
  <ul class="posts">
    {% for post in site.posts %}
      <li>
        <span>{{ post.date | date_to_string }}</span> &raquo; 
        <a href="/blog{{ post.url }}">{{ post.title }}</a>
      </li>

    {% endfor %}
      <li>
        <a href="{{ site.blogurl }}">post.url</a>
        <a href="{{ site.url }}">post.url</a>
        <a href="{{ post.url }}">post.url</a>
      </li>
  </ul>
</div>
